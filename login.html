<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
HSZA Utility Billing System
</title>

<link
rel="stylesheet"
href="css/login.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="login-wrapper">

    <div class="login-card">

        <div class="login-header">

            <img
            src="assets/logo_hosza_unisza.png"
            alt="HoSZA Logo">

            <h1>

                Utility Billing System

            </h1>

            <p>

                Hospital Sultan Zainal Abidin

            </p>

        </div>

        <form
        id="loginForm">

            <div class="form-group">

                <label>

                    Username

                </label>

                <div class="input-group">

                    <i
                    class="fa fa-user">

                    </i>

                    <input
                    type="text"
                    id="username"
                    required>

                </div>

            </div>

            <div class="form-group">

                <label>

                    Password

                </label>

                <div class="input-group">

                    <i
                    class="fa fa-lock">

                    </i>

                    <input
                    type="password"
                    id="password"
                    required>

                </div>

            </div>

            <button
            type="submit"
            class="btn-login">

                LOGIN

            </button>

        </form>

        <div
        id="loginMessage">

        </div>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
